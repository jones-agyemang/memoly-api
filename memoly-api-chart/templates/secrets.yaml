apiVersion: v1
kind: Secret
metadata:
  name: {{ include "memoly-api.fullname" . }}
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  postgres-password: {{ .Values.postgresql.auth.password | quote }}
  REDIS_URL: {{ .Values.redis.url | quote }}
  DATABASE_URL: {{ .Values.database.url | quote }}
  POSTMARK_API_KEY: {{ .Values.postmark.apiKey | quote }}
  R2_ACCESS_KEY_ID: {{ .Values.r2.accessKeyId | quote }}
  R2_SECRET_ACCESS_KEY: {{ .Values.r2.secretAccessKey | quote }}
  R2_BUCKET_NAME: {{ .Values.r2.bucketName | quote }}
  R2_ENDPOINT_URL: {{ .Values.r2.endpointUrl | quote }}
  R2_PUBLIC_DOMAIN: {{ .Values.r2.publicDomain | quote }}
  RAILS_MASTER_KEY: {{ .Values.rails.masterKey | quote }}
